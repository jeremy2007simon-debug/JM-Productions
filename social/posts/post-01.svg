<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040814"/>
      <stop offset="100%" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="orb1g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <clipPath id="clip">
      <rect width="1080" height="1080"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Orbs -->
  <g clip-path="url(#clip)">
    <circle cx="200" cy="250" r="420" fill="url(#orb1g)" filter="url(#blur1)"/>
    <circle cx="900" cy="850" r="320" fill="url(#orb2g)" filter="url(#blur2)"/>
  </g>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="90" x2="1080" y2="90" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="180" x2="1080" y2="180" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="270" x2="1080" y2="270" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="360" x2="1080" y2="360" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="450" x2="1080" y2="450" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="540" x2="1080" y2="540" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="630" x2="1080" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="720" x2="1080" y2="720" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="810" x2="1080" y2="810" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="900" x2="1080" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="990" x2="1080" y2="990" stroke="#6366f1" stroke-width="1"/>
    <line x1="90" y1="0" x2="90" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="270" y1="0" x2="270" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="630" y1="0" x2="630" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="810" y1="0" x2="810" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="990" y1="0" x2="990" y2="1080" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Top label -->
  <rect x="380" y="108" width="320" height="44" rx="22" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="540" y="136" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#a5b4fc" text-anchor="middle" letter-spacing="2">AUTOMATIZACIÓN</text>

  <!-- Main stat -->
  <text x="540" y="300" font-family="-apple-system, system-ui, sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="url(#accent)" letter-spacing="-8">80%</text>

  <!-- Divider line -->
  <rect x="180" y="340" width="720" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Main headline -->
  <text x="540" y="430" font-family="-apple-system, system-ui, sans-serif" font-size="52" font-weight="800" fill="#eef2ff" text-anchor="middle" letter-spacing="-1">de las tareas de tu equipo</text>
  <text x="540" y="496" font-family="-apple-system, system-ui, sans-serif" font-size="52" font-weight="800" fill="#eef2ff" text-anchor="middle" letter-spacing="-1">se pueden automatizar hoy.</text>

  <!-- Sub text -->
  <text x="540" y="590" font-family="-apple-system, system-ui, sans-serif" font-size="34" font-weight="400" fill="#6b7fa3" text-anchor="middle">&#191;Cu&#225;nto dinero est&#225;s dejando</text>
  <text x="540" y="634" font-family="-apple-system, system-ui, sans-serif" font-size="34" font-weight="400" fill="#6b7fa3" text-anchor="middle">sobre la mesa cada semana?</text>

  <!-- Stats row -->
  <rect x="100" y="700" width="260" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="230" y="758" font-family="-apple-system, system-ui, sans-serif" font-size="42" font-weight="900" fill="url(#accent)" text-anchor="middle">40h</text>
  <text x="230" y="796" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="500" fill="#6b7fa3" text-anchor="middle">recuperadas/semana</text>

  <rect x="410" y="700" width="260" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="540" y="758" font-family="-apple-system, system-ui, sans-serif" font-size="42" font-weight="900" fill="url(#accent)" text-anchor="middle">62%</text>
  <text x="540" y="796" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="500" fill="#6b7fa3" text-anchor="middle">menos costos</text>

  <rect x="720" y="700" width="260" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="850" y="758" font-family="-apple-system, system-ui, sans-serif" font-size="42" font-weight="900" fill="url(#accent)" text-anchor="middle">3x</text>
  <text x="850" y="796" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="500" fill="#6b7fa3" text-anchor="middle">m&#225;s capacidad</text>

  <!-- CTA -->
  <rect x="290" y="868" width="500" height="64" rx="32" fill="url(#accent)"/>
  <text x="540" y="908" font-family="-apple-system, system-ui, sans-serif" font-size="26" font-weight="700" fill="white" text-anchor="middle">Auditor&#237;a gratuita &#8594; link en bio</text>

  <!-- Logo / branding -->
  <text x="540" y="1010" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">JM PRODUCTIONS</text>
  <text x="540" y="1040" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="middle">@jmproductions.ic</text>

</svg>
