<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040814"/>
      <stop offset="100%" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="orb1g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2g" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect width="1080" height="1080"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Orbs -->
  <g clip-path="url(#clip)">
    <circle cx="180" cy="300" r="500" fill="url(#orb1g)" filter="url(#blur1)"/>
    <circle cx="960" cy="820" r="400" fill="url(#orb2g)" filter="url(#blur2)"/>
  </g>

  <!-- Subtle grid -->
  <g opacity="0.035">
    <line x1="0" y1="108" x2="1080" y2="108" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="216" x2="1080" y2="216" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="324" x2="1080" y2="324" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="432" x2="1080" y2="432" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="540" x2="1080" y2="540" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="648" x2="1080" y2="648" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="756" x2="1080" y2="756" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="864" x2="1080" y2="864" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="972" x2="1080" y2="972" stroke="#6366f1" stroke-width="1"/>
    <line x1="108" y1="0" x2="108" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="216" y1="0" x2="216" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="324" y1="0" x2="324" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="432" y1="0" x2="432" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="648" y1="0" x2="648" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="756" y1="0" x2="756" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="864" y1="0" x2="864" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <line x1="972" y1="0" x2="972" y2="1080" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1080" height="4" fill="url(#accent)"/>

  <!-- Logo icon centered -->
  <g transform="translate(504, 148)">
    <rect width="72" height="72" rx="18" fill="url(#accent)"/>
    <polyline points="14,40 26,27 38,40 50,27" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="14,54 26,41 38,54 50,41" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  </g>

  <!-- NEW ACCOUNT badge -->
  <rect x="390" y="252" width="300" height="42" rx="21" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <circle cx="418" cy="273" r="5" fill="#6366f1"/>
  <text x="540" y="280" font-family="-apple-system, system-ui, sans-serif" font-size="16" font-weight="600" fill="#a5b4fc" text-anchor="middle" letter-spacing="3">NUEVA CUENTA</text>

  <!-- Main title -->
  <text x="540" y="370" font-family="-apple-system, system-ui, sans-serif" font-size="96" font-weight="900" fill="url(#accent)" text-anchor="middle" letter-spacing="-3" filter="url(#glow)">JM</text>
  <text x="540" y="468" font-family="-apple-system, system-ui, sans-serif" font-size="72" font-weight="900" fill="#eef2ff" text-anchor="middle" letter-spacing="-2">Productions</text>

  <!-- Divider -->
  <rect x="220" y="500" width="640" height="1.5" rx="1" fill="url(#accent)" opacity="0.25"/>

  <!-- Tagline -->
  <text x="540" y="568" font-family="-apple-system, system-ui, sans-serif" font-size="38" font-weight="700" fill="#eef2ff" text-anchor="middle" letter-spacing="-0.5">Automatizamos tu negocio</text>
  <text x="540" y="618" font-family="-apple-system, system-ui, sans-serif" font-size="38" font-weight="700" fill="#eef2ff" text-anchor="middle" letter-spacing="-0.5">para que puedas crecer</text>
  <text x="540" y="668" font-family="-apple-system, system-ui, sans-serif" font-size="38" font-weight="700" fill="url(#accent)" text-anchor="middle" letter-spacing="-0.5">sin l&#237;mites.</text>

  <!-- Divider -->
  <rect x="220" y="706" width="640" height="1.5" rx="1" fill="url(#accent)" opacity="0.25"/>

  <!-- 3 pillars -->
  <text x="200" y="768" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">&#10003; Ventas</text>
  <text x="200" y="800" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">automatizadas</text>

  <rect x="325" y="750" width="1.5" height="66" fill="rgba(255,255,255,0.1)"/>

  <text x="540" y="768" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">&#10003; Procesos</text>
  <text x="540" y="800" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">optimizados</text>

  <rect x="753" y="750" width="1.5" height="66" fill="rgba(255,255,255,0.1)"/>

  <text x="880" y="768" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">&#10003; Resultados</text>
  <text x="880" y="800" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">medibles</text>

  <!-- CTA button -->
  <rect x="290" y="856" width="500" height="66" rx="33" fill="url(#accent)"/>
  <text x="540" y="898" font-family="-apple-system, system-ui, sans-serif" font-size="26" font-weight="700" fill="white" text-anchor="middle">Auditor&#237;a gratuita &#8594; link en bio</text>

  <!-- Handle -->
  <text x="540" y="990" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="1">@jmproductions.ic</text>

  <!-- Bottom border accent -->
  <rect x="0" y="1076" width="1080" height="4" fill="url(#accent)"/>

</svg>
